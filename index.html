<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .calculator {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            width: 100%;
            max-width: 350px;
        }
        
        .display {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }
        
        .previous {
            color: #888;
            font-size: 14px;
            height: 20px;
            overflow: hidden;
            word-wrap: break-word;
        }
        
        .current {
            color: #fff;
            font-size: 36px;
            font-weight: 300;
            height: 45px;
            overflow: hidden;
            word-wrap: break-word;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-number {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-number:hover {
            background: #e0e0e0;
        }
        
        .btn-operator {
            background: #667eea;
            color: #fff;
        }
        
        .btn-operator:hover {
            background: #5a6fd6;
        }
        
        .btn-function {
            background: #95a5a6;
            color: #fff;
        }
        
        .btn-function:hover {
            background: #7f8c8d;
        }
        
        .btn-equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            grid-column: span 2;
        }
        
        .btn-equals:hover {
            opacity: 0.9;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous" id="previous"></div>
            <div class="current" id="current">0</div>
        </div>
        
        <div class="buttons">
            <button class="btn-function" onclick="clearAll()">AC</button>
            <button class="btn-function" onclick="deleteLast()">DEL</button>
            <button class="btn-function" onclick="appendOperator('%')">%</button>
            <button class="btn-operator" onclick="appendOperator('/')">÷</button>
            
            <button class="btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn-operator" onclick="appendOperator('*')">×</button>
            
            <button class="btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn-operator" onclick="appendOperator('-')">−</button>
            
            <button class="btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn-operator" onclick="appendOperator('+')">+</button>
            
            <button class="btn-number" onclick="appendNumber('0')">0</button>
            <button class="btn-number" onclick="appendDecimal()">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
        
        <div class="footer">
            在线计算器
        </div>
    </div>
    
    <script>
        let current = '0';
        let previous = '';
        let operator = null;
        let shouldResetScreen = false;
        
        function updateDisplay() {
            document.getElementById('current').textContent = current;
            document.getElementById('previous').textContent = previous;
        }
        
        function appendNumber(num) {
            if (shouldResetScreen) {
                current = '';
                shouldResetScreen = false;
            }
            if (current === '0' && num !== '.') {
                current = num;
            } else {
                current += num;
            }
            updateDisplay();
        }
        
        function appendDecimal() {
            if (shouldResetScreen) {
                current = '0';
                shouldResetScreen = false;
            }
            if (!current.includes('.')) {
                current += '.';
            }
            updateDisplay();
        }
        
        function appendOperator(op) {
            if (operator !== null && !shouldResetScreen) {
                calculate();
            }
            previous = current + ' ' + getDisplayOperator(op);
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
        }
        
        function getDisplayOperator(op) {
            const ops = { '+': '+', '-': '−', '*': '×', '/': '÷', '%': '%' };
            return ops[op] || op;
        }
        
        function calculate() {
            if (operator === null || shouldResetScreen) return;
            
            let result;
            const prev = parseFloat(previous);
            const curr = parseFloat(current);
            
            if (isNaN(prev) || isNaN(curr)) return;
            
            switch (operator) {
                case '+':
                    result = prev + curr;
                    break;
                case '-':
                    result = prev - curr;
                    break;
                case '*':
                    result = prev * curr;
                    break;
                case '/':
                    if (curr === 0) {
                        result = 'ERROR';
                    } else {
                        result = prev / curr;
                    }
                    break;
                case '%':
                    result = prev % curr;
                    break;
                default:
                    return;
            }
            
            // 处理浮点数精度
            if (typeof result === 'number') {
                result = Math.round(result * 1000000000) / 1000000000;
            }
            
            current = result.toString();
            previous = '';
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
        }
        
        function clearAll() {
            current = '0';
            previous = '';
            operator = null;
            shouldResetScreen = false;
            updateDisplay();
        }
        
        function deleteLast() {
            if (current.length === 1 || (current.length === 2 && current[0] === '-')) {
                current = '0';
            } else {
                current = current.slice(0, -1);
            }
            updateDisplay();
        }
        
        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal();
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') appendOperator('/');
            if (e.key === '%') appendOperator('%');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') deleteLast();
        });
    </script>
</body>
</html>
